{% extends 'base.html' %}{% block title %}Conflict Coach{% endblock %}{% block content %}<h1>Conflict Resolution Coach</h1><div class='grid'><section class='card'><h2>Analyze transcript</h2><input id='role' placeholder='Your speaker name or role (optional)'><textarea id='transcript' placeholder='Paste the conversation'></textarea><button id='analyze'>Analyze</button><div id='analysis'></div></section><section class='card'><h2>Rewrite a message</h2><textarea id='rewriteMessage'></textarea><select id='style'>{% for s in rewrite_styles %}<option value='{{ s }}'>{{ s|title }}</option>{% endfor %}</select><textarea id='context' placeholder='Context (optional)'></textarea><button id='rewrite'>Rewrite</button><div id='rewriteOut'></div></section></div><section class='card'><h2>Perspective switch</h2><textarea id='selected' placeholder='Selected message'></textarea><button id='perspective'>Analyze perspective</button><div id='perspectiveOut'></div></section>{% endblock %}{% block scripts %}<script>
const q=id=>document.getElementById(id);async function api(url,data){let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});let j=await r.json();if(!r.ok||!j.success)throw new Error(j.message||'Request failed');return j.data}function list(a){return '<ul>'+(a||[]).map(x=>'<li>'+x+'</li>').join('')+'</ul>'}
q('analyze').onclick=async()=>{try{let d=await api('/api/conflict/analyze',{transcript:q('transcript').value,user_role:q('role').value});if(d.crisis_detected){q('analysis').innerHTML='<div class="alert error">'+d.message+'</div>';return}let a=d.analysis;q('analysis').innerHTML=`<h3>${a.primary_issue||''}</h3><p>${a.summary||''}</p><h3>Next steps</h3>${list(a.recommended_next_steps)}<a class='button secondary' href='/report/${d.analysis_id}'>Open saved report</a>`}catch(e){q('analysis').innerHTML='<div class="alert error">'+e.message+'</div>'}};
q('rewrite').onclick=async()=>{try{let d=await api('/api/conflict/rewrite',{message:q('rewriteMessage').value,style:q('style').value,context:q('context').value});q('rewriteOut').innerHTML=d.crisis_detected?'<div class="alert error">'+d.message+'</div>':`<div class='alert success'>${d.rewritten_message||''}</div>${list(d.changes)}<p>${d.why_it_may_help||''}</p>`}catch(e){q('rewriteOut').innerHTML='<div class="alert error">'+e.message+'</div>'}};
q('perspective').onclick=async()=>{try{let d=await api('/api/conflict/perspective',{transcript:q('transcript').value,selected_message:q('selected').value});q('perspectiveOut').innerHTML=d.crisis_detected?'<div class="alert error">'+d.message+'</div>':`<h3>Possible interpretations</h3>${list((d.possible_interpretations||[]).map(x=>x.interpretation+' — '+x.why))}<h3>Clearer version</h3><div class='alert success'>${d.clearer_version||''}</div>`}catch(e){q('perspectiveOut').innerHTML='<div class="alert error">'+e.message+'</div>'}};
</script>{% endblock %}

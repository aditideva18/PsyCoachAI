<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>{% block title %}PsyCoach AI{% endblock %}</title><style>body{font-family:Arial;margin:0;background:#f4f7fb;color:#18202a}.nav{background:#fff;padding:14px 24px;border-bottom:1px solid #ddd;display:flex;justify-content:space-between}.nav a{margin-right:12px}.container{max-width:1000px;margin:auto;padding:28px}.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:22px;margin-bottom:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}input,select,textarea{width:100%;padding:10px;margin:6px 0 14px;border:1px solid #bbb;border-radius:8px}button,.button{background:#4f46e5;color:#fff;border:0;border-radius:8px;padding:10px 16px;cursor:pointer;text-decoration:none}.secondary{background:#e9edf5;color:#18202a}.danger{background:#b91c1c}.hidden{display:none}.alert{padding:10px;border-radius:8px;background:#fff7ed;margin:10px 0}.error{background:#fef2f2;color:#b91c1c}.success{background:#ecfdf5;color:#047857}.chat{height:380px;overflow:auto;background:#eef3f9;padding:12px;border-radius:10px}.message{padding:10px 12px;border-radius:12px;margin:8px 0;max-width:80%;white-space:pre-wrap}.message.ai{background:#fff}.message.user{background:#4f46e5;color:white;margin-left:auto}.score{display:grid;grid-template-columns:160px 1fr 45px;gap:10px;align-items:center;margin:8px 0}.bar{height:10px;background:#e5e7eb;border-radius:10px;overflow:hidden}.bar span{display:block;height:100%;background:#4f46e5}</style>{% block head %}{% endblock %}</head><body><div class='nav'><a href='{{ url_for("home_page") }}'><b>PsyCoach AI</b></a><div>{% if current_user %}<a href='{{ url_for("dashboard_page") }}'>Dashboard</a><a href='{{ url_for("practice_page") }}'>Practice</a><a href='{{ url_for("conflict_page") }}'>Conflict</a><a href='{{ url_for("history_page") }}'>History</a><form style='display:inline' method='post' action='{{ url_for("logout") }}'><button class='secondary'>Logout</button></form>{% else %}<a href='{{ url_for("login_page") }}'>Login</a><a class='button' href='{{ url_for("register_page") }}'>Register</a>{% endif %}</div></div><main class='container'>{% block content %}{% endblock %}</main>{% block scripts %}{% endblock %}</body></html>

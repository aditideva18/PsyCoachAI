{% extends 'base.html' %}{% block title %}Practice{% endblock %}{% block content %}<div class='grid'><section class='card'><h1>Conversation Simulator</h1><label>Scenario</label><select id='scenario'>{% for key,item in scenarios.items() %}<option value='{{ key }}'>{{ item.title }}</option>{% endfor %}</select><label>Difficulty</label><select id='difficulty'>{% for item in difficulties %}<option value='{{ item }}'>{{ item|title }}</option>{% endfor %}</select><label>Personality</label><select id='personality'>{% for item in personalities %}<option value='{{ item }}'>{{ item|title }}</option>{% endfor %}</select><button id='start'>Start</button> <button id='end' class='danger hidden'>End and analyze</button><div id='status' class='alert hidden'></div></section><section class='card'><div id='chat' class='chat'><p>Start a session.</p></div><div id='entry' class='hidden'><textarea id='message' placeholder='Type your response'></textarea><button id='send'>Send</button></div></section></div><section id='report' class='card hidden'><h2>Analysis</h2><div id='reportBody'></div></section>{% endblock %}{% block scripts %}<script>
let sid=null;const q=id=>document.getElementById(id);function msg(role,text){let d=document.createElement('div');d.className='message '+role;d.textContent=text;q('chat').appendChild(d);q('chat').scrollTop=q('chat').scrollHeight}function status(t,e=false){q('status').textContent=t;q('status').className='alert '+(e?'error':'success')}async function api(url,data){let r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});let j=await r.json();if(!r.ok||!j.success)throw new Error(j.message||'Request failed');return j.data}
q('start').onclick=async()=>{try{q('start').disabled=true;let d=await api('/api/practice/start',{scenario:q('scenario').value,difficulty:q('difficulty').value,personality:q('personality').value});sid=d.practice_session_id;q('chat').innerHTML='';msg('ai',d.reply);q('entry').classList.remove('hidden');q('end').classList.remove('hidden');status('Session started')}catch(e){status(e.message,true);q('start').disabled=false}};
q('send').onclick=async()=>{let t=q('message').value.trim();if(!t)return;msg('user',t);q('message').value='';try{let d=await api('/api/practice/message',{practice_session_id:sid,message:t});msg('ai',d.crisis_detected?d.message:d.reply)}catch(e){status(e.message,true)}};
q('end').onclick=async()=>{try{let d=await api('/api/practice/end',{practice_session_id:sid});let a=d.analysis,s=a.scores||{};q('reportBody').innerHTML=`<p>${a.summary||''}</p>${Object.entries(s).map(([k,v])=>`<div class='score'><span>${k.replaceAll('_',' ')}</span><div class='bar'><span style='width:${v*10}%'></span></div><b>${v}/10</b></div>`).join('')}<h3>Strengths</h3><ul>${(a.strengths||[]).map(x=>`<li>${x}</li>`).join('')}</ul><h3>Improvements</h3><ul>${(a.improvement_areas||[]).map(x=>`<li>${x}</li>`).join('')}</ul><a class='button secondary' href='/report/${d.analysis_id}'>Open saved report</a>`;q('report').classList.remove('hidden');q('entry').classList.add('hidden');q('end').classList.add('hidden');q('start').disabled=false;sid=null}catch(e){status(e.message,true)}};
</script>{% endblock %}
